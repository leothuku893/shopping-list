<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping-List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <h1>Shopping List</h1>

        <input type="text" id="itemInput" placeholder="Add a new item...">
        <input type="number" id="itemPrice" placeholder="Price" step="0.01">
        
        <button id="addItemButton">Add Item</button>
        <button id="sortListButton">Clear List</button>
        
    </div>

    <div class="actions">
        <h3>Total Purchased Cost: $<span id="totalCost">0.00</span></h3>
     <ul id="shoppingList"></ul>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
